<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">We regret to inform you</title>
  <desc id="desc">A pink paper notice taped to a gray metal door with the words We regret to inform you.</desc>
  <defs>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="12" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#3d3933" flood-opacity="0.18" />
    </filter>
    <linearGradient id="door" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a4a19d" />
      <stop offset="0.45" stop-color="#817f7b" />
      <stop offset="1" stop-color="#b1ada8" />
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9a18f" />
      <stop offset="0.48" stop-color="#edb8a9" />
      <stop offset="1" stop-color="#c98d7d" />
    </linearGradient>
    <linearGradient id="tape" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbf7" stop-opacity="0.62" />
      <stop offset="0.55" stop-color="#d9ece8" stop-opacity="0.52" />
      <stop offset="1" stop-color="#fffaf1" stop-opacity="0.68" />
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="#b9b5af" />
  <rect y="0" width="1080" height="1080" fill="url(#door)" />
  <g opacity="0.85">
    <path d="M0 36h1080" stroke="#57534f" stroke-width="6" />
    <path d="M0 78h1080" stroke="#ddd8d1" stroke-width="7" />
    <path d="M0 124h1080" stroke="#5c5854" stroke-width="6" />
    <path d="M0 145h1080" stroke="#e7e2da" stroke-width="8" />
    <path d="M0 201h1080" stroke="#5e5a55" stroke-width="7" />
    <path d="M0 229h1080" stroke="#d8d3ca" stroke-width="6" />
    <path d="M0 308h1080" stroke="#6b6660" stroke-width="7" />
    <path d="M0 335h1080" stroke="#d9d4cc" stroke-width="6" />
    <path d="M0 403h1080" stroke="#5f5b56" stroke-width="7" />
    <path d="M0 451h1080" stroke="#dad5cd" stroke-width="6" />
    <path d="M0 516h1080" stroke="#5c5752" stroke-width="7" />
    <path d="M0 553h1080" stroke="#ded9d1" stroke-width="6" />
    <path d="M0 627h1080" stroke="#5e5954" stroke-width="7" />
    <path d="M0 684h1080" stroke="#ded9d1" stroke-width="6" />
    <path d="M0 766h1080" stroke="#5d5954" stroke-width="7" />
    <path d="M0 812h1080" stroke="#ded9d1" stroke-width="6" />
    <path d="M0 909h1080" stroke="#66615c" stroke-width="7" />
    <path d="M0 966h1080" stroke="#ded9d1" stroke-width="6" />
  </g>
  <g opacity="0.3">
    <rect x="250" y="884" width="62" height="18" rx="9" fill="#d9d5ce" stroke="#615e59" stroke-width="2" />
    <rect x="688" y="884" width="62" height="18" rx="9" fill="#d9d5ce" stroke="#615e59" stroke-width="2" />
  </g>

  <g filter="url(#softShadow)">
    <polygon points="80,252 252,156 318,282 152,368" fill="url(#tape)" />
    <polygon points="750,239 808,153 948,225 974,302 906,367" fill="url(#tape)" />
    <polygon points="111,755 181,724 290,880 236,927" fill="url(#tape)" />
    <polygon points="865,713 994,813 901,889 804,804" fill="url(#tape)" />
  </g>

  <path
    d="M184 337 C197 271 266 238 338 235 L780 236 C858 238 890 286 890 352 L889 708 C872 760 820 807 744 812 L293 812 C229 807 190 767 189 704 L185 342 Z"
    fill="url(#paper)"
    filter="url(#paperGrain)"
  />
  <g opacity="0.28">
    <path d="M188 390 C331 381 545 389 889 389" stroke="#8f665b" stroke-width="7" />
    <path d="M187 511 C356 505 605 516 889 509" stroke="#8c6258" stroke-width="6" />
    <path d="M190 637 C379 626 620 642 889 631" stroke="#8b6259" stroke-width="7" />
    <path d="M219 786 C344 774 427 800 530 784 C612 772 702 773 824 792" stroke="#fff0e8" stroke-width="8" fill="none" />
  </g>

  <g fill="#070504" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle">
    <text x="540" y="463" font-size="96" letter-spacing="4">We regret to</text>
    <text x="540" y="610" font-size="98" letter-spacing="4">inform</text>
    <text x="540" y="756" font-size="104" letter-spacing="5">YOU</text>
  </g>
</svg>
